<!DOCTYPE html>
<html>
<head>
<title>Register Form</title>
</head>

<body>

<h2>Registration Form</h2>

<form action="login.html">

Name: <br>
<input type="text" placeholder="Enter name" required><br><br>

Email: <br>
<input type="email" placeholder="Enter email" required><br><br>

Password: <br>
<input type="password" placeholder="Enter password" required><br><br>

Confirm Password: <br>
<input type="password" placeholder="Confirm password" required><br><br>

Mobile Number: <br>
<input type="tel" placeholder="Enter mobile number"><br><br>

Gender: <br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

Education: <br>
<input type="checkbox"> 10th
<input type="checkbox"> Inter
<input type="checkbox"> Diploma
<input type="checkbox"> BTech
<br><br>

City: <br>
<select>
<option>Select City</option>
<option>Hyderabad</option>
<option>Vijayawada</option>
<option>Vizag</option>
</select>
<br><br>

Address: <br>
<textarea rows="4" cols="30"></textarea>
<br><br>

<input type="submit" value="Register">

</form>

<p>Already have an account? <a href="login.html">Login</a></p>

</body>
</html>
